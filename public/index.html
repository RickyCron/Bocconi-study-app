<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bocconi Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login overlay -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">

    <!-- Step 1: Username -->
    <div class="login-step" id="login-step-username">
      <div class="login-logo">Bocconi Study</div>
      <h1 class="login-title">Welcome</h1>
      <p class="login-subtitle">Sign in, or enter a new username to create an account.</p>
      <input type="text" class="login-input" id="login-username-input" placeholder="Username" maxlength="20"
        autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false"
        onkeydown="if(event.key==='Enter')loginStepPin()">
      <button class="btn-primary login-continue-btn" onclick="loginStepPin()">Continue</button>
    </div>

    <!-- Step 2: PIN -->
    <div class="login-step login-step-hidden" id="login-step-pin">
      <button class="login-back" onclick="loginStepBack()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </button>
      <div class="login-user-badge" id="login-user-badge"></div>
      <p class="login-pin-label" id="login-pin-label">Enter your PIN</p>
      <div class="login-dots" id="login-dots">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="login-keypad">
        <button onclick="loginPinDigit('1')">1</button>
        <button onclick="loginPinDigit('2')">2</button>
        <button onclick="loginPinDigit('3')">3</button>
        <button onclick="loginPinDigit('4')">4</button>
        <button onclick="loginPinDigit('5')">5</button>
        <button onclick="loginPinDigit('6')">6</button>
        <button onclick="loginPinDigit('7')">7</button>
        <button onclick="loginPinDigit('8')">8</button>
        <button onclick="loginPinDigit('9')">9</button>
        <div></div>
        <button onclick="loginPinDigit('0')">0</button>
        <button class="login-key-del" onclick="loginPinBackspace()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 6H8l-7 6 7 6h13V6z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/><path d="M18 9l-6 6M12 9l6 6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="login-error" id="login-error"></div>
    </div>

  </div>
</div>

<!-- Floating nav pill -->
<nav class="top-nav">
  <div class="nav-brand">Bocconi</div>
  <button class="nav-btn active" onclick="navigate('dashboard')" id="nav-dashboard">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Dashboard</span>
  </button>
  <button class="nav-btn" onclick="navigate('study-orbit')" id="nav-study-orbit">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3a9 9 0 109 9"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 7a5 5 0 105 5"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 11a1 1 0 101 1M19 3v5h-5M14 8l5-5"/></svg>
    <span>Orbit</span>
  </button>
  <button class="nav-btn" onclick="navigate('courses')" id="nav-courses">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
    <span>Courses</span>
  </button>
  <button class="nav-btn" onclick="navigate('tutor')" id="nav-tutor">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
    <span>Tutor</span>
  </button>
  <button class="nav-btn" onclick="navigate('settings')" id="nav-settings">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    <span>Settings</span>
  </button>

  <!-- Profile button + dropdown -->
  <div class="nav-profile-wrap" id="nav-profile-wrap" style="display:none; position:relative;">
    <div class="nav-divider"></div>
    <button class="nav-profile-btn" id="nav-profile-btn" onclick="toggleProfileMenu()">
      <span class="nav-profile-avatar" id="nav-profile-avatar"></span>
      <span class="nav-profile-uname" id="nav-profile-uname"></span>
    </button>
    <div class="profile-dropdown" id="profile-dropdown">
      <div class="profile-dd-user" id="profile-dd-user"></div>
      <div class="profile-dd-sep"></div>
      <button class="profile-dd-item" onclick="showChangePinModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.75"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        Change PIN
      </button>
      <button class="profile-dd-item profile-dd-danger" onclick="logout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Sign out
      </button>
    </div>
  </div>
</nav>

<!-- Change PIN modal -->
<div class="modal-overlay" id="pin-change-modal" style="display:none;" onclick="if(event.target===this)closeChangePinModal()">
  <div class="modal-box" style="max-width:340px; text-align:center;">
    <div class="modal-header">
      <div class="modal-title" id="pin-change-title">Change PIN</div>
      <button onclick="closeChangePinModal()" class="close-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body" style="display:flex; flex-direction:column; align-items:center; gap:0;">
      <p class="login-pin-label" id="pin-change-label" style="margin-bottom:1.5rem;">Enter your current PIN</p>
      <div class="login-dots" id="pin-change-dots">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="login-keypad" style="max-width:240px; width:100%;">
        <button onclick="cpDigit('1')">1</button>
        <button onclick="cpDigit('2')">2</button>
        <button onclick="cpDigit('3')">3</button>
        <button onclick="cpDigit('4')">4</button>
        <button onclick="cpDigit('5')">5</button>
        <button onclick="cpDigit('6')">6</button>
        <button onclick="cpDigit('7')">7</button>
        <button onclick="cpDigit('8')">8</button>
        <button onclick="cpDigit('9')">9</button>
        <div></div>
        <button onclick="cpDigit('0')">0</button>
        <button class="login-key-del" onclick="cpBackspace()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 6H8l-7 6 7 6h13V6z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/><path d="M18 9l-6 6M12 9l6 6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="login-error" id="pin-change-error" style="margin-top:0.75rem;"></div>
    </div>
  </div>
</div>

<!-- App shell: one slim container per view -->
<div class="app">
  <div class="content-area">

    <div class="view active" id="view-dashboard">
      <div data-view-content></div>
    </div>

    <div class="view" id="view-study-orbit">
      <div data-view-content></div>
    </div>

    <div class="view" id="view-courses">
      <div data-view-content></div>
    </div>

    <div class="view" id="view-course-detail">
      <div data-view-content></div>
    </div>

    <div class="view" id="view-tutor">
      <div data-view-content></div>
    </div>

    <div class="view" id="view-settings">
      <div data-view-content></div>
    </div>

  </div>
</div>

<!-- Quiz modal (populated by components/quiz-modal.js) -->
<div class="modal-overlay" id="quiz-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="quiz-title">Quiz</div>
        <div class="modal-sub" id="quiz-progress-label">Question 1 of 10</div>
      </div>
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <div style="font-family: 'Geist Mono', monospace; font-size: 1.125rem; font-weight: 600; color: var(--accent);" id="quiz-score-display">0/0</div>
        <button onclick="closeQuiz()" class="close-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <div class="modal-body" id="quiz-body"></div>
  </div>
</div>

<!-- Listen / TTS modal (populated by components/listen-modal.js) -->
<div class="modal-overlay" id="listen-modal">
  <div class="modal-box" style="max-width: 620px;">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="listen-title">Listen</div>
        <div class="modal-sub" id="listen-subtitle"></div>
      </div>
      <button onclick="closeListen()" class="close-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div style="background: var(--bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; font-size: 0.9rem; color: var(--t2); line-height: 1.6; max-height: 14rem; overflow-y: auto;" id="listen-text"></div>
      <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.875rem;">
        <button onclick="ttsPlay()" id="btn-play" class="btn-primary">Play</button>
        <button onclick="ttsPause()" id="btn-pause" class="btn-secondary" style="display: none;">Pause</button>
        <button onclick="ttsStop()" class="btn-secondary">Stop</button>
        <div style="margin-left: auto; display: flex; align-items: center; gap: 0.5rem;">
          <span style="font-size: 0.8125rem; color: var(--t3);">Speed</span>
          <select id="listen-speed" style="width: auto; padding: 0.3rem 1.5rem 0.3rem 0.5rem;" onchange="ttsUpdateSpeed()">
            <option value="1.0">1x</option>
            <option value="1.3">1.3x</option>
            <option value="1.6" selected>1.6x</option>
            <option value="2.0">2x</option>
            <option value="2.5">2.5x</option>
          </select>
        </div>
      </div>
      <div class="progress-bar" style="height: 2px;">
        <div class="progress-fill animated" id="tts-progress-bar" style="width: 0%; --progress-target: 0%; background: var(--accent);"></div>
      </div>
    </div>
  </div>
</div>

<!-- Voice conversation modal (wired by views/tutor/tutor-voice.js) -->
<div class="modal-overlay voice-modal-overlay" id="voice-modal" style="display:none;" onclick="if(event.target===this)closeVoiceModal()">
  <div class="voice-modal-box">
    <button class="voice-close-btn" onclick="closeVoiceModal()" aria-label="End voice chat">
      <svg width="16" height="16" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
    </button>
    <div class="voice-stage">
      <div class="voice-orb" id="voice-orb" data-state="listening">
        <div class="voice-orb-core"></div>
        <div class="voice-orb-ring"></div>
        <div class="voice-orb-ring voice-orb-ring-2"></div>
      </div>
      <div class="voice-status" id="voice-status">Listening…</div>
      <div class="voice-continuing-hint" id="voice-continuing-hint" hidden></div>
    </div>
    <div class="voice-transcript" id="voice-transcript"></div>
    <div class="voice-controls">
      <button class="voice-ctrl-btn" id="voice-mute-btn" onclick="toggleVoiceMute()" aria-label="Mute microphone">
        <svg viewBox="0 0 16 16" fill="none"><rect x="6" y="2" width="4" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3.5 7v1a4.5 4.5 0 009 0V7M8 12.5V14M5.5 14h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Mute</span>
      </button>
      <button class="voice-ctrl-btn voice-ctrl-end" onclick="closeVoiceModal()" aria-label="End voice chat">
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        <span>End</span>
      </button>
    </div>
  </div>
</div>

<!-- Silero VAD — served locally from node_modules -->
<script src="/ort/ort.wasm.min.js"></script>
<script src="/vad/bundle.min.js"></script>

<script type="module" src="app.js"></script>
</body>
</html>
